# Render Blueprint — connect repo: New → Blueprint → select render.yaml
services:
  - type: web
    name: food-delivery-api
    runtime: node
    plan: free
    region: oregon
    rootDir: Food_devlivary_Application-main/Food_devlivary_Application-main/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: fullstack-ecommerce-app
    runtime: python
    plan: free
    region: oregon
    rootDir: FullStack_Ecommerce_App
    buildCommand: chmod +x ./build.sh && ./build.sh
    startCommand: cd backend && gunicorn my_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/products/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # MERN Ecommerce Store — single web service serving BOTH the React
  # frontend (built into frontend/dist) and the Express API on one URL.
  - type: web
    name: mern-ecommerce-store
    runtime: node
    plan: free
    region: oregon
    rootDir: MERN-Ecommerce-Store
    buildCommand: npm install && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: "production"
      - key: MONGO_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
